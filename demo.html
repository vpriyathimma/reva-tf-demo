<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Reva × TrueFoundry — Authorization</title>
<style>
  :root {
    --bg: #0a0c10; --panel: #0e1117; --field: #0b0e13; --border: #1b212b;
    --text: #e8edf3; --muted: #7c8896; --brand: #2f74ff; --brand-2: #37c0ff;
    --allow: #35d07f; --allow-bd: #16351f; --deny: #ff5c57; --deny-bd: #37171a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: flex-start; justify-content: center; padding: 72px 20px;
  }
  .wrap { width: 100%; max-width: 560px; }

  /* centered header + reva-style mark */
  header { text-align: center; margin-bottom: 40px; }
  .mark { width: 34px; height: 34px; margin: 0 auto 18px; display: block; }
  h1 { font-size: 22px; font-weight: 600; letter-spacing: -.02em; margin: 0 0 8px; }
  .sub { color: var(--muted); font-size: 14px; max-width: 400px; margin: 0 auto; }

  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
  .row { display: flex; gap: 14px; margin-bottom: 18px; }
  .row > * { flex: 1; min-width: 0; }
  .field { margin-bottom: 18px; }
  label { display: block; font-size: 12.5px; color: var(--muted); margin-bottom: 7px; }
  select, textarea {
    width: 100%; background: var(--field); border: 1px solid var(--border); color: var(--text);
    border-radius: 10px; padding: 11px 13px; font: inherit; transition: border-color .15s;
  }
  textarea { resize: vertical; min-height: 44px; }
  select:focus, textarea:focus { outline: none; border-color: var(--brand); }
  .meta { color: var(--muted); font-size: 12.5px; margin-top: 8px; min-height: 16px; }

  button {
    width: 100%; border: 0; border-radius: 11px; padding: 13px; cursor: pointer;
    font: inherit; font-weight: 600; color: #fff;
    background: linear-gradient(135deg, var(--brand), var(--brand-2));
    transition: opacity .15s;
  }
  button:hover { opacity: .92; }
  button:disabled { opacity: .5; cursor: default; }

  .result { margin-top: 24px; text-align: center; display: none; }
  .result.show { display: block; }
  .badge { font-size: 15px; font-weight: 600; letter-spacing: .02em; }
  .result.allow .badge { color: var(--allow); }
  .result.deny  .badge { color: var(--deny); }

  details { margin-top: 16px; }
  summary { color: var(--muted); font-size: 12.5px; cursor: pointer; list-style: none; }
  summary::-webkit-details-marker { display: none; }
  summary::before { content: "› "; }
  details[open] summary::before { content: "⌄ "; }
  pre {
    background: var(--field); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; overflow-x: auto; font-size: 12px; color: #b9c4d2; margin: 10px 0 0;
  }
  .foot { color: var(--muted); font-size: 12.5px; margin-top: 26px; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <svg class="mark" viewBox="0 0 32 32" fill="none" aria-hidden="true">
      <defs>
        <linearGradient id="rg" x1="0" y1="0" x2="32" y2="32">
          <stop offset="0" stop-color="#2f74ff"/><stop offset="1" stop-color="#37c0ff"/>
        </linearGradient>
      </defs>
      <path d="M6 7 L15 25 L18 25 L11 7 Z" fill="url(#rg)"/>
      <path d="M20 7 C27 8 28 16 20 18 L26 25 L22 25 L17 18 L17 15 C23 15 23 10 18 10 Z" fill="url(#rg)"/>
    </svg>
    <h1>Reva × TrueFoundry</h1>
    <div class="sub">An LLM request is checked against Reva policies before it reaches the model.</div>
  </header>

  <div class="card">
    <div class="row">
      <div>
        <label>User</label>
        <select id="persona"></select>
        <div class="meta" id="personaMeta"></div>
      </div>
      <div>
        <label>Model requested</label>
        <select id="model">
          <option value="gpt-4o">gpt-4o · premium</option>
          <option value="gpt-4-turbo">gpt-4-turbo · premium</option>
          <option value="gpt-4o-mini">gpt-4o-mini · standard</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Prompt</label>
      <textarea id="prompt">Summarize the Q2 billing report.</textarea>
    </div>
    <button id="go">Authorize request</button>

    <div class="result" id="result">
      <span class="badge" id="badge"></span>
    </div>

    <details id="detailsBox" style="display:none">
      <summary>Show the eval request &amp; Reva response</summary>
      <pre id="reqOut"></pre>
      <pre id="respOut"></pre>
    </details>
  </div>

  <div class="foot">Every decision is recorded in the store's Decision Logs.</div>
</div>

<script>
  const PERSONAS = [
    { id: "carol@free",    team: "free-team",    tier: "free", note: "free tier — blocked from premium models" },
    { id: "alice@analyst", team: "analyst-team", tier: "paid", note: "analyst — full model access" },
    { id: "bob@intern",    team: "intern-team",  tier: "paid", note: "intern — only gpt-4o-mini" },
    { id: "dan@finance",   team: "finance-team", tier: "paid", note: "finance — full access" },
  ];
  const sel = document.getElementById("persona");
  PERSONAS.forEach(p => { const o = document.createElement("option"); o.value = p.id; o.textContent = p.id; sel.appendChild(o); });
  const metaEl = document.getElementById("personaMeta");
  const cur = () => PERSONAS.find(p => p.id === sel.value);
  const updateMeta = () => { const p = cur(); metaEl.textContent = p.team + " · " + p.note; };
  sel.addEventListener("change", updateMeta); updateMeta();

  const btn = document.getElementById("go");
  btn.addEventListener("click", async () => {
    const p = cur();
    const body = {
      requestBody: { model: document.getElementById("model").value,
                     messages: [{ role: "user", content: document.getElementById("prompt").value }] },
      context: { user: { subjectId: p.id, subjectSlug: p.id }, metadata: { team: p.team, tier: p.tier } },
      config: {}
    };
    btn.disabled = true; btn.textContent = "Checking with Reva…";
    const result = document.getElementById("result"); result.className = "result";
    try {
      const r = await fetch("/reva/authorize", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body) });
      const data = await r.json();
      const allow = data.verdict === true;
      result.className = "result show " + (allow ? "allow" : "deny");
      document.getElementById("badge").textContent = allow ? "Allow" : "Deny";
      document.getElementById("detailsBox").style.display = "block";
      document.getElementById("reqOut").textContent  = "→ sent to plugin:\n" + JSON.stringify(body, null, 2);
      document.getElementById("respOut").textContent = "← Reva verdict:\n"   + JSON.stringify(data, null, 2);
    } catch (e) {
      result.className = "result show deny";
      document.getElementById("badge").textContent = "Error";
    } finally { btn.disabled = false; btn.textContent = "Authorize request"; }
  });
</script>
</body>
</html>
